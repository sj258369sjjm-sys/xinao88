<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>新澳特曼数据统计论坛</title>

<style>
body{
  background:#bfe9ff;
  font-family:Arial;
  text-align:center;
  margin:0;
}

h1{font-size:60px;margin-top:80px;}

.btn{
  display:inline-block;
  margin:10px;
  padding:15px 25px;
  background:white;
  border-radius:10px;
}

#adminPanel{
  display:none;
  margin-top:30px;
}
</style>

<script>
function login(){
  let pass = prompt("请输入管理员密码：");
  if(pass === "123456"){
    document.getElementById("adminPanel").style.display = "block";
    alert("已进入管理员模式");
  } else {
    alert("密码错误");
  }
}
</script>

</head>

<body>

<h1>新澳特曼数据统计论坛</h1>

<p>自动脚本每期采集
 统计全网10万人特围</p>

<div>
  <div class="btn">📝 文字内容区（公开）</div>
</div>

<button onclick="login()" class="btn">🔐 管理员入口</button>

<div id="adminPanel">
  <h2>管理员控制台</h2>
  <div class="btn">📷 上传图片</div>
  <div class="btn">🎥 上传视频</div>
</div>

</body>
</html>


<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>号码分析记录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', sans-serif; background: #0a0e27; color: #e0e0e0; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; color: #00d4ff; font-size: 28px; margin-bottom: 30px; text-shadow: 0 0 10px #00d4ff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
  .card { background: #131a3a; border: 1px solid #1e2d5a; border-radius: 12px; padding: 20px; text-align: center; text-decoration: none; color: #e0e0e0; transition: all 0.3s; }
  .card:hover { border-color: #00d4ff; transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,212,255,0.2); }
  .card .period { font-size: 22px; color: #00d4ff; font-weight: bold; margin-bottom: 10px; }
  .card .info { font-size: 13px; color: #8892b0; line-height: 1.8; }
  .card .nums { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .tag-main { background: #0e4d4d; color: #00d4ff; }
  .tag-sub { background: #3d2e00; color: #ffb347; }
  .tag-def { background: #2d2d00; color: #ffd700; }
  .tag-kill { background: #3d0000; color: #ff4757; }
  .footer { text-align: center; margin-top: 40px; color: #555; font-size: 12px; }
</style>
</head>
